<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회계팀 매출 대시보드 - 2026년 3월</title>
    <<script src="https://unpkg.com/chart.js@3.9.1/dist/chart.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 헤더 -->
        <header class="header">
            <h1>📊 회계팀 매출 대시보드</h1>
            <p class="subtitle">2026년 3월 업체별 매출 현황</p>
        </header>

        <!-- 요약 카드 -->
        <div class="summary-section">
            <div class="summary-card">
                <h3>총 매출액</h3>
                <p class="big-number" id="totalSales">$398,684.44</p>
                <span class="currency">USD</span>
            </div>
            <div class="summary-card">
                <h3>업체 수</h3>
                <p class="big-number" id="companyCount">4</p>
                <span class="subtitle-small">개 업체</span>
            </div>
            <div class="summary-card">
                <h3>평균 매출</h3>
                <p class="big-number" id="avgSales">$99,671.11</p>
                <span class="currency">USD</span>
            </div>
            <div class="summary-card">
                <h3>최대 매출</h3>
                <p class="big-number" id="maxSales">$204,064.01</p>
                <span class="currency">ESTEC</span>
            </div>
        </div>

        <!-- 차트 섹션 -->
        <div class="charts-section">
            <!-- 막대 그래프 -->
            <div class="chart-container">
                <h2>업체별 매출 비교 (막대 그래프)</h2>
                <canvas id="barChart"></canvas>
            </div>

            <!-- 원형 그래프 -->
            <div class="chart-container">
                <h2>매출 비율 (원형 그래프)</h2>
                <canvas id="pieChart"></canvas>
            </div>
        </div>

        <!-- 상세 테이블 -->
        <div class="table-section">
            <h2>📋 상세 매출 현황</h2>
            <table class="invoice-table">
                <thead>
                    <tr>
                        <th>업체명</th>
                        <th>매출액 (USD)</th>
                        <th>비율 (%)</th>
                        <th>송장 번호</th>
                        <th>발행일</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- JavaScript로 동적 생성 -->
                </tbody>
            </table>
        </div>

        <!-- 푸터 -->
        <footer class="footer">
            <p>📅 데이터 기준: 2026년 3월 | 화폐: USD (미국 달러)</p>
            <p>이 대시보드는 인보이스 PDF에서 자동 추출된 데이터를 기반으로 합니다.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
